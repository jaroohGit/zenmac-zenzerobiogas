name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            REGISTRY_OWNER="${{ github.repository_owner }}" IMAGE_TAG=latest docker compose -f docker-compose.prod.yml pull
            REGISTRY_OWNER="${{ github.repository_owner }}" IMAGE_TAG=latest docker compose -f docker-compose.prod.yml up -d --remove-orphans