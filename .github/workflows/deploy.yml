name: Deploy

on:
  workflow_run:
    workflows:
      - Publish Docker Images
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check deployment secrets
        id: check-secrets
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "::warning::DEPLOY_HOST secret is not configured — skipping deployment."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

      - name: Deploy application
        if: steps.check-secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            REGISTRY_OWNER="${{ github.repository_owner }}" IMAGE_TAG=latest docker compose -f docker-compose.prod.yml pull
            REGISTRY_OWNER="${{ github.repository_owner }}" IMAGE_TAG=latest docker compose -f docker-compose.prod.yml up -d --remove-orphans